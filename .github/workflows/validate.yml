name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Lint
        continue-on-error: true
        run: npm run lint --workspace memorycrystal-app
      - name: Typecheck
        continue-on-error: true
        run: npm run typecheck --workspace memorycrystal-app
